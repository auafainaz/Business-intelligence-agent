<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="920" viewBox="0 0 1320 920" role="img" aria-labelledby="title desc">
  <title id="title">Fainaz ClientIQ LangGraph Architecture</title>
  <desc id="desc">End-to-end architecture graph from public website through Twilio, Grok realtime voice, FastAPI, LangGraph, SQLite, dashboard, Gmail, Twilio SMS, and local JSON output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#060A12"/>
      <stop offset="52%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#05070C"/>
    </linearGradient>
    <linearGradient id="node" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#182131"/>
      <stop offset="100%" stop-color="#0E1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#5EE7FF"/>
      <stop offset="100%" stop-color="#8B7CFF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#54DDF5"/>
    </marker>
    <style>
      .title { fill: #F7FBFF; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 36px; font-weight: 750; letter-spacing: 0; }
      .subtitle { fill: #AAB8CB; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 15px; letter-spacing: 0; }
      .section { fill: #60E7FF; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 750; letter-spacing: 2px; }
      .node-title { fill: #F8FBFF; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 17px; font-weight: 740; letter-spacing: 0; }
      .node-sub { fill: #AEBBD0; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 12px; letter-spacing: 0; }
      .pill { fill: #D7F8FF; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0; }
      .small { fill: #8D9BB1; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 11px; letter-spacing: 0; }
      .line { stroke: #54DDF5; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .line-muted { stroke: #36465D; stroke-width: 1.6; fill: none; }
    </style>
  </defs>

  <rect width="1320" height="920" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="180" fill="#172C48" opacity="0.22"/>
  <circle cx="160" cy="790" r="230" fill="#1C2250" opacity="0.18"/>
  <rect x="40" y="36" width="1240" height="848" rx="24" fill="#0A0F19" stroke="#202A39"/>

  <text x="80" y="95" class="section">FAINAZ CLIENTIQ</text>
  <text x="80" y="138" class="title">LangGraph Product Architecture</text>
  <text x="80" y="166" class="subtitle">Live voice stays thin. Intelligence, persistence, dashboard assembly, and direct delivery happen behind the call path.</text>

  <rect x="82" y="196" width="315" height="34" rx="17" fill="#0D2832" stroke="#225C6B"/>
  <text x="102" y="218" class="pill">Runtime decision: no external workflow automation</text>
  <rect x="414" y="196" width="246" height="34" rx="17" fill="#141A35" stroke="#333B70"/>
  <text x="434" y="218" class="pill">Direct Gmail + Twilio SMS</text>
  <rect x="677" y="196" width="258" height="34" rx="17" fill="#121F25" stroke="#31515A"/>
  <text x="697" y="218" class="pill">Public/Internal data separated</text>

  <!-- Main flow nodes -->
  <g filter="url(#softShadow)">
    <rect x="86" y="286" width="200" height="98" rx="14" fill="url(#node)" stroke="#2B394C"/>
    <rect x="106" y="306" width="36" height="36" rx="10" fill="#102B36" stroke="#266676"/>
    <text x="158" y="323" class="node-title">Public Website</text>
    <text x="158" y="346" class="node-sub">Premium phone CTA</text>
    <text x="106" y="370" class="small">Next.js + Tailwind</text>

    <rect x="354" y="286" width="200" height="98" rx="14" fill="url(#node)" stroke="#2B394C"/>
    <rect x="374" y="306" width="36" height="36" rx="10" fill="#102B36" stroke="#266676"/>
    <text x="426" y="323" class="node-title">Twilio Inbound</text>
    <text x="426" y="346" class="node-sub">Webhook + media stream</text>
    <text x="374" y="370" class="small">Voice call metadata</text>

    <rect x="622" y="286" width="220" height="98" rx="14" fill="url(#node)" stroke="#2B394C"/>
    <rect x="642" y="306" width="36" height="36" rx="10" fill="#191D45" stroke="#4A53A8"/>
    <text x="694" y="323" class="node-title">Grok Realtime</text>
    <text x="694" y="346" class="node-sub">Supervisor Voice Agent</text>
    <text x="642" y="370" class="small">Barge-in + one question</text>

    <rect x="910" y="286" width="238" height="98" rx="14" fill="url(#node)" stroke="#2B394C"/>
    <rect x="930" y="306" width="36" height="36" rx="10" fill="#102B36" stroke="#266676"/>
    <text x="982" y="323" class="node-title">Live Research</text>
    <text x="982" y="346" class="node-sub">Official public website</text>
    <text x="930" y="370" class="small">One grounded observation</text>
  </g>

  <path class="line" d="M286 335 H344"/>
  <path class="line" d="M554 335 H612"/>
  <path class="line" d="M842 335 H900"/>

  <g filter="url(#softShadow)">
    <rect x="910" y="468" width="238" height="98" rx="14" fill="url(#node)" stroke="#2B394C"/>
    <rect x="930" y="488" width="36" height="36" rx="10" fill="#182A1E" stroke="#3E7A4F"/>
    <text x="982" y="505" class="node-title">FastAPI Tools</text>
    <text x="982" y="528" class="node-sub">save_dashboard_data</text>
    <text x="930" y="552" class="small">Tool dispatch + validation</text>

    <rect x="622" y="468" width="220" height="98" rx="14" fill="url(#node)" stroke="#2B394C"/>
    <rect x="642" y="488" width="36" height="36" rx="10" fill="#191D45" stroke="#4A53A8"/>
    <text x="694" y="505" class="node-title">LangGraph</text>
    <text x="694" y="528" class="node-sub">Post-call intelligence</text>
    <text x="642" y="552" class="small">Transcript + enrichment</text>

    <rect x="354" y="468" width="200" height="98" rx="14" fill="url(#node)" stroke="#2B394C"/>
    <rect x="374" y="488" width="36" height="36" rx="10" fill="#281E35" stroke="#684A91"/>
    <text x="426" y="505" class="node-title">SQLite</text>
    <text x="426" y="528" class="node-sub">Public/Internal records</text>
    <text x="374" y="552" class="small">Calls + payloads + delivery</text>

    <rect x="86" y="468" width="200" height="98" rx="14" fill="url(#node)" stroke="#2B394C"/>
    <rect x="106" y="488" width="36" height="36" rx="10" fill="#102B36" stroke="#266676"/>
    <text x="158" y="505" class="node-title">Dashboard Route</text>
    <text x="158" y="528" class="node-sub">/dashboard/[slug]</text>
    <text x="106" y="552" class="small">Public-safe rendering</text>
  </g>

  <path class="line" d="M1029 384 V458"/>
  <path class="line" d="M910 517 H852"/>
  <path class="line" d="M622 517 H564"/>
  <path class="line" d="M354 517 H296"/>

  <g filter="url(#softShadow)">
    <rect x="238" y="666" width="220" height="98" rx="14" fill="url(#node)" stroke="#2B394C"/>
    <rect x="258" y="686" width="36" height="36" rx="10" fill="#2C2413" stroke="#9B732B"/>
    <text x="310" y="703" class="node-title">Direct Delivery</text>
    <text x="310" y="726" class="node-sub">Gmail SMTP + Twilio SMS</text>
    <text x="258" y="750" class="small">Idempotent retries</text>

    <rect x="622" y="666" width="220" height="98" rx="14" fill="url(#node)" stroke="#2B394C"/>
    <rect x="642" y="686" width="36" height="36" rx="10" fill="#281E35" stroke="#684A91"/>
    <text x="694" y="703" class="node-title">Local JSON Output</text>
    <text x="694" y="726" class="node-sub">backend/outputs/calls</text>
    <text x="642" y="750" class="small">Debug artifact</text>
  </g>

  <path class="line" d="M186 566 C186 622 238 622 312 656"/>
  <path class="line" d="M458 715 H612"/>

  <!-- Runtime subgraph -->
  <rect x="914" y="642" width="258" height="164" rx="16" fill="#080D15" stroke="#283446"/>
  <text x="936" y="675" class="section">RUNTIME INTELLIGENCE GRAPH</text>
  <rect x="936" y="702" width="190" height="30" rx="8" fill="#111827" stroke="#2B394C"/>
  <text x="952" y="722" class="small">transcript_intelligence</text>
  <rect x="936" y="742" width="190" height="30" rx="8" fill="#111827" stroke="#2B394C"/>
  <text x="952" y="762" class="small">business_enrichment</text>
  <rect x="936" y="782" width="190" height="30" rx="8" fill="#111827" stroke="#2B394C"/>
  <text x="952" y="802" class="small">dashboard_payload</text>
  <path class="line-muted" d="M1031 732 V742"/>
  <path class="line-muted" d="M1031 772 V782"/>

  <!-- Legend -->
  <rect x="84" y="812" width="1032" height="42" rx="12" fill="#071019" stroke="#1E2C3C"/>
  <text x="106" y="839" class="subtitle">Graph guarantee: save first -> dashboard second -> delivery third. Public dashboard data and internal transcript data stay separated.</text>
  <rect x="1118" y="812" width="62" height="42" rx="12" fill="url(#accent)" opacity="0.92"/>
  <text x="1136" y="839" class="pill" fill="#041018">MVP</text>
</svg>
